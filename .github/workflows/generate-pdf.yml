name: Generate Resume PDF

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Permisos explícitos para que el bot pueda escribir en el repositorio
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Necesario para que gh-pages pueda pushear correctamente
          persist-credentials: true

      - name: Markdown PDF
        uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_path: CV_Mario_Moreno.md
          output_dir: ./output
          build_html: false

      - name: Fix permissions
        run: sudo chown -R $USER:$USER .

      - name: Rename Output
        run: |
          mkdir -p ./final_cv
          mv ./output/CV_Mario_Moreno.pdf ./final_cv/CV_Mario_Moreno_Senior_Engineering_Manager.pdf

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Professional_CV
          path: ./final_cv/CV_Mario_Moreno_Senior_Engineering_Manager.pdf

      - name: Deploy to Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final_cv
          publish_branch: pdf-download
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
